<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --border: #e2e0d8;
      --border-dark: #c8c5bb;
      --text: #1a1916;
      --text-muted: #7a7870;
      --accent-light: #f0ede6;
      --green: #2d6a4f;
      --green-bg: #eaf4ee;
      --red: #c0392b;
      --red-bg: #fdf0ef;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--text);
      color: #fff;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #fff;
    }

    .header-logo span { color: #888; font-weight: 400; }

    .header-badge {
      font-family: var(--mono);
      font-size: 12px;
      color: #666;
    }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 53px);
    }

    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
      .preview-col { border-left: none; border-top: 1px solid var(--border); }
    }

    /* Form Column */
    .form-col {
      padding: 28px 24px;
      overflow-y: auto;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }

    .form-group label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .form-group input {
      padding: 9px 11px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: var(--sans);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
    }

    .form-group input:focus {
      border-color: var(--text);
      box-shadow: 0 0 0 3px rgba(26,25,22,0.07);
    }

    .form-group input[readonly] {
      background: var(--accent-light);
      font-family: var(--mono);
      font-size: 13px;
      cursor: default;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 26px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 18px;
      font-size: 13px;
      font-family: var(--sans);
      font-weight: 500;
      border-radius: var(--radius);
      border: 1px solid var(--border-dark);
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
    .btn-primary:hover { background: #333; }
    .btn-secondary { background: var(--surface); color: var(--text); }
    .btn-secondary:hover { background: var(--accent-light); }
    .btn-sm {
      padding: 7px 12px;
      font-size: 11px;
      background: var(--red-bg);
      color: var(--red);
      border-color: #f5c6c2;
    }
    .btn-sm:hover { background: #fbe4e2; }

    /* Toast */
    .toast {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 14px;
      animation: fadeSlide 0.2s ease;
    }

    .toast.success { background: var(--green-bg); color: var(--green); border: 1px solid #b7dfc8; display: flex; }
    .toast.error   { background: var(--red-bg);   color: var(--red);   border: 1px solid #f5c6c2; display: flex; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* History */
    .history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    #historyList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    #historyList li {
      display: flex;
      align-items: center;
      padding: 11px 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      transition: all 0.15s;
      gap: 8px;
    }

    #historyList li:hover { border-color: var(--border-dark); background: var(--accent-light); }

    .hist-left { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .hist-no   { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--text); }
    .hist-client { font-size: 12px; color: var(--text-muted); }

    .hist-right { text-align: right; display: flex; flex-direction: column; gap: 2px; }
    .hist-amount { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); }
    .hist-date   { font-size: 11px; color: var(--text-muted); }

    .hist-del {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 18px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
      flex-shrink: 0;
    }
    .hist-del:hover { color: var(--red); background: var(--red-bg); }

    .hist-empty {
      text-align: center;
      padding: 26px;
      color: var(--text-muted);
      font-size: 13px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      cursor: default !important;
    }

    /* Preview Column */
    .preview-col {
      background: #e8e6df;
      border-left: 1px solid var(--border);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
    }

    .preview-wrap {
      background: #fff;
      border-radius: 4px;
      box-shadow: var(--shadow);
      flex: 1;
    }

    /* Invoice Document */
    #invoice {
      padding: 44px 40px;
      min-height: 500px;
      font-family: var(--sans);
      background: #fff;
      color: #111;
    }

    .inv-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 2px solid #111;
      padding-bottom: 22px;
      margin-bottom: 28px;
    }

    .inv-title {
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #111;
    }

    .inv-no-pill {
      font-family: var(--mono);
      font-size: 11px;
      background: #f0ede6;
      color: #666;
      padding: 5px 10px;
      border-radius: 4px;
      margin-top: 6px;
      display: inline-block;
    }

    .inv-date-block { text-align: right; }
    .inv-date-label { font-size: 10px; color: #999; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
    .inv-date-value { font-size: 14px; color: #111; }

    .inv-parties {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    .inv-party label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #999;
      display: block;
      margin-bottom: 4px;
    }

    .inv-party p { font-size: 14px; color: #111; line-height: 1.5; }
    .inv-party .sub { color: #999; font-size: 12px; margin-top: 2px; }

    .inv-table-head {
      display: flex;
      justify-content: space-between;
      padding: 7px 0;
      border-top: 1px solid #e0e0e0;
      border-bottom: 1px solid #e0e0e0;
      margin-bottom: 0;
    }

    .inv-table-head span {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #999;
    }

    .inv-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid #f2f2f2;
    }

    .inv-row .svc { font-size: 14px; color: #111; }
    .inv-row .amt { font-family: var(--mono); font-size: 14px; color: #111; }

    .inv-total {
      display: flex;
      justify-content: flex-end;
      margin-top: 18px;
    }

    .inv-total-pill {
      background: #1a1916;
      color: #fff;
      padding: 13px 22px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .inv-total-pill .lbl {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
    }

    .inv-total-pill .val {
      font-family: var(--mono);
      font-size: 19px;
      font-weight: 500;
    }

    .inv-foot {
      margin-top: 36px;
      padding-top: 14px;
      border-top: 1px solid #e8e8e8;
      font-size: 11px;
      color: #bbb;
      text-align: center;
      font-family: var(--mono);
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-logo">Invoice<span>Gen</span></div>
  <div class="header-badge" id="headerBadge">—</div>
</header>

<div class="layout">

  <!-- Form Column -->
  <div class="form-col">

    <div class="section-label">Invoice Details</div>
    <div id="toast" class="toast"></div>

    <div class="form-grid">
      <div class="form-group">
        <label for="invoiceNo">Invoice No</label>
        <input type="text" id="invoiceNo" readonly placeholder="Auto" />
      </div>
      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" />
      </div>
      <div class="form-group">
        <label for="yourName">Your Name</label>
        <input type="text" id="yourName" placeholder="Nischay B99" />
      </div>
      <div class="form-group">
        <label for="yourEmail">Your Email</label>
        <input type="email" id="yourEmail" placeholder="you@gmail.com" />
      </div>
      <div class="form-group">
        <label for="clientName">Client Name</label>
        <input type="text" id="clientName" placeholder="Akash Kumar" />
      </div>
      <div class="form-group">
        <label for="service">Service</label>
        <input type="text" id="service" placeholder="Web Development" />
      </div>
      <div class="form-group full">
        <label for="amount">Amount (₹)</label>
        <input type="number" id="amount" placeholder="82556" min="0" />
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="generateBtn">&#9654;&nbsp; Generate</button>
      <button class="btn btn-secondary" id="downloadBtn">&#8595;&nbsp; Download PDF</button>
    </div>

    <!-- History -->
    <div class="history-head">
      <div class="section-label" style="flex:1;margin-bottom:0;">Invoice History</div>
      <button class="btn btn-sm" id="clearAllBtn" style="margin-left:12px;">Clear All</button>
    </div>
    <ul id="historyList"></ul>

  </div>

  <!-- Preview Column -->
  <div class="preview-col">
    <div class="section-label">Preview</div>
    <div class="preview-wrap">
      <div id="invoice">
        <div class="inv-header-row">
          <div>
            <div class="inv-title">INVOICE</div>
            <div class="inv-no-pill" id="invNo">INV-000</div>
          </div>
          <div class="inv-date-block">
            <div class="inv-date-label">Date</div>
            <div class="inv-date-value" id="invDate">—</div>
          </div>
        </div>

        <div class="inv-parties">
          <div class="inv-party">
            <label>From</label>
            <p id="invYourName">—</p>
            <p class="sub" id="invEmail">—</p>
          </div>
          <div class="inv-party">
            <label>Bill To</label>
            <p id="invClient">—</p>
          </div>
        </div>

        <div class="inv-table-head">
          <span>Description</span>
          <span>Amount</span>
        </div>
        <div class="inv-row">
          <span class="svc" id="invService">—</span>
          <span class="amt">&#8377;&nbsp;<span id="invAmount">0</span></span>
        </div>

        <div class="inv-total">
          <div class="inv-total-pill">
            <span class="lbl">Total Due</span>
            <span class="val">&#8377;&nbsp;<span id="invTotalAmt">0</span></span>
          </div>
        </div>

        <div class="inv-foot">Thank you for your business.</div>
      </div>
    </div>
  </div>

</div>

<script>
(function () {

  var KEY_CTR     = "inv_counter";
  var KEY_NAME    = "user_name";
  var KEY_EMAIL   = "user_email";
  var KEY_HISTORY = "invoices";

  /* ── Helpers ── */
  function getVal(id) {
    var el = document.getElementById(id);
    if (el !== null && el instanceof HTMLInputElement) return el.value.trim();
    return "";
  }

  function setVal(id, val) {
    var el = document.getElementById(id);
    if (el !== null && el instanceof HTMLInputElement) el.value = val;
  }

  function setText(id, val) {
    var el = document.getElementById(id);
    if (el !== null) el.innerText = val;
  }

  function showToast(msg, type) {
    var t = document.getElementById("toast");
    if (t === null) return;
    t.innerText = (type === "success" ? "✓  " : "✕  ") + msg;
    t.className = "toast " + type;
    clearTimeout(t._timer);
    t._timer = setTimeout(function () { t.className = "toast"; }, 3000);
  }

  /* ── Invoice Number ── */
  function pad3(n) {
    return n < 10 ? "00" + n : n < 100 ? "0" + n : String(n);
  }

  function peekNext() {
    var s = localStorage.getItem(KEY_CTR);
    var n = s !== null ? parseInt(s, 10) : 0;
    if (isNaN(n)) n = 0;
    return "INV-" + pad3(n + 1);
  }

  function consumeNext() {
    var s = localStorage.getItem(KEY_CTR);
    var n = s !== null ? parseInt(s, 10) : 0;
    if (isNaN(n)) n = 0;
    n = n + 1;
    localStorage.setItem(KEY_CTR, String(n));
    return "INV-" + pad3(n);
  }

  /* ── History CRUD ── */
  function loadHistory() {
    var raw = localStorage.getItem(KEY_HISTORY);
    if (raw === null) return [];
    try {
      var p = JSON.parse(raw);
      return Array.isArray(p) ? p : [];
    } catch (_e) { return []; }
  }

  function saveHistory(arr) {
    localStorage.setItem(KEY_HISTORY, JSON.stringify(arr));
  }

  function pushHistory(inv) {
    var arr = loadHistory();
    var found = false;
    for (var i = 0; i < arr.length; i++) {
      if (arr[i].invoiceNo === inv.invoiceNo) { arr[i] = inv; found = true; break; }
    }
    if (!found) arr.unshift(inv);
    saveHistory(arr);
  }

  function deleteInv(invoiceNo) {
    saveHistory(loadHistory().filter(function (x) { return x.invoiceNo !== invoiceNo; }));
    renderHistory();
    showToast("Deleted " + invoiceNo, "error");
  }

  /* ── Render History List ── */
  function renderHistory() {
    var list = document.getElementById("historyList");
    if (list === null) return;
    var arr = loadHistory();
    list.innerHTML = "";

    if (arr.length === 0) {
      var li = document.createElement("li");
      li.className = "hist-empty";
      li.innerText = "No invoices yet. Generate one above.";
      list.appendChild(li);
      return;
    }

    for (var i = 0; i < arr.length; i++) {
      (function (inv) {
        var li = document.createElement("li");

        var left = document.createElement("div");
        left.className = "hist-left";

        var no = document.createElement("span");
        no.className = "hist-no";
        no.innerText = inv.invoiceNo;

        var cl = document.createElement("span");
        cl.className = "hist-client";
        cl.innerText = inv.clientName || "—";

        left.appendChild(no);
        left.appendChild(cl);

        var right = document.createElement("div");
        right.className = "hist-right";

        var amt = document.createElement("span");
        amt.className = "hist-amount";
        amt.innerText = "₹ " + (inv.amount || "0");

        var dt = document.createElement("span");
        dt.className = "hist-date";
        dt.innerText = inv.date || "";

        right.appendChild(amt);
        right.appendChild(dt);

        var del = document.createElement("button");
        del.className = "hist-del";
        del.innerText = "×";
        del.title = "Delete invoice";
        del.addEventListener("click", function (e) {
          e.stopPropagation();
          deleteInv(inv.invoiceNo);
        });

        li.appendChild(left);
        li.appendChild(right);
        li.appendChild(del);

        li.addEventListener("click", function () {
          fillForm(inv);
          showToast("Loaded " + inv.invoiceNo, "success");
        });

        list.appendChild(li);
      })(arr[i]);
    }
  }

  /* ── Fill Form from History ── */
  function fillForm(inv) {
    setVal("invoiceNo",  inv.invoiceNo);
    setVal("date",       inv.date);
    setVal("yourName",   inv.yourName);
    setVal("yourEmail",  inv.yourEmail);
    setVal("clientName", inv.clientName);
    setVal("service",    inv.service);
    setVal("amount",     inv.amount);
    refreshPreview(inv.invoiceNo, inv.date, inv.yourName, inv.yourEmail, inv.clientName, inv.service, inv.amount);
  }

  /* ── Refresh Preview ── */
  function refreshPreview(no, date, name, email, client, service, amount) {
    setText("invNo",       no);
    setText("invDate",     date);
    setText("invYourName", name);
    setText("invEmail",    email);
    setText("invClient",   client);
    setText("invService",  service);
    setText("invAmount",   amount);
    setText("invTotalAmt", amount);
    var badge = document.getElementById("headerBadge");
    if (badge !== null) badge.innerText = no;
  }

  /* ── Generate ── */
  function generateInvoice() {
    var date    = getVal("date");
    var name    = getVal("yourName");
    var client  = getVal("clientName");
    var service = getVal("service");
    var amount  = getVal("amount");

    if (!date || !name || !client || !service || !amount) {
      showToast("Fill all fields before generating.", "error");
      return;
    }

    var no    = consumeNext();
    var email = getVal("yourEmail");

    setVal("invoiceNo", no);

    var inv = {
      invoiceNo:  no,
      date:       date,
      yourName:   name,
      yourEmail:  email,
      clientName: client,
      service:    service,
      amount:     amount
    };

    refreshPreview(no, date, name, email, client, service, amount);
    pushHistory(inv);
    renderHistory();

    setVal("invoiceNo", peekNext());
    showToast("Generated " + no, "success");
  }

  /* ── PDF ── */
  function buildHTML() {
    var no      = getVal("invoiceNo");
    var date    = getVal("date");
    var name    = getVal("yourName");
    var email   = getVal("yourEmail");
    var client  = getVal("clientName");
    var service = getVal("service");
    var amount  = getVal("amount");

    return (
      "<div style='font-family:Arial,sans-serif;padding:44px 40px;background:#fff;color:#111;'>" +
      "<div style='display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #111;padding-bottom:22px;margin-bottom:28px;'>" +
      "<div><div style='font-size:30px;font-weight:700;letter-spacing:-0.5px;'>INVOICE</div>" +
      "<div style='font-family:monospace;font-size:11px;background:#f0ede6;color:#666;padding:5px 10px;border-radius:4px;margin-top:6px;display:inline-block;'>" + no + "</div></div>" +
      "<div style='text-align:right;'><div style='font-size:10px;color:#999;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;'>Date</div>" +
      "<div style='font-size:14px;'>" + date + "</div></div></div>" +
      "<div style='display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;'>" +
      "<div><div style='font-size:10px;color:#999;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;margin-bottom:4px;'>From</div>" +
      "<div style='font-size:14px;'>" + name + "</div>" +
      "<div style='font-size:12px;color:#999;margin-top:2px;'>" + email + "</div></div>" +
      "<div><div style='font-size:10px;color:#999;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;margin-bottom:4px;'>Bill To</div>" +
      "<div style='font-size:14px;'>" + client + "</div></div></div>" +
      "<div style='display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0;margin-bottom:0;'>" +
      "<span style='font-size:10px;color:#999;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;'>Description</span>" +
      "<span style='font-size:10px;color:#999;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;'>Amount</span></div>" +
      "<div style='display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f2f2f2;'>" +
      "<span style='font-size:14px;'>" + service + "</span>" +
      "<span style='font-family:monospace;font-size:14px;'>&#8377; " + amount + "</span></div>" +
      "<div style='display:flex;justify-content:flex-end;margin-top:18px;'>" +
      "<div style='background:#1a1916;color:#fff;padding:13px 22px;border-radius:8px;display:flex;align-items:center;gap:18px;'>" +
      "<span style='font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#888;'>Total Due</span>" +
      "<span style='font-family:monospace;font-size:19px;font-weight:500;'>&#8377; " + amount + "</span></div></div>" +
      "<div style='margin-top:36px;padding-top:14px;border-top:1px solid #e8e8e8;font-size:11px;color:#bbb;text-align:center;font-family:monospace;'>Thank you for your business.</div>" +
      "</div>"
    );
  }

  function downloadPDF() {
    var no = getVal("invoiceNo");
    if (!no || !getVal("clientName")) {
      showToast("Generate an invoice first.", "error");
      return;
    }

    var wrapper = document.createElement("div");
    wrapper.style.position      = "fixed";
    wrapper.style.top           = "0";
    wrapper.style.left          = "0";
    wrapper.style.width         = "794px";
    wrapper.style.zIndex        = "-1";
    wrapper.style.opacity       = "0";
    wrapper.style.pointerEvents = "none";
    wrapper.innerHTML = buildHTML();
    document.body.appendChild(wrapper);

    var target = wrapper.firstElementChild;
    if (!(target instanceof HTMLElement)) {
      document.body.removeChild(wrapper);
      return;
    }

    showToast("Generating PDF…", "success");

    html2pdf()
      .set({
        margin: [10, 10, 10, 10],
        filename: no + ".pdf",
        html2canvas: { scale: 2, useCORS: true, scrollX: 0, scrollY: 0, windowWidth: 794 },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
      })
      .from(target)
      .save()
      .then(function () { document.body.removeChild(wrapper); });
  }

  /* ── User Data Persistence ── */
  function loadUserData() {
    var n = localStorage.getItem(KEY_NAME);
    var e = localStorage.getItem(KEY_EMAIL);
    if (n !== null) setVal("yourName",  n);
    if (e !== null) setVal("yourEmail", e);
  }

  function watchUserData() {
    var nameEl  = document.getElementById("yourName");
    var emailEl = document.getElementById("yourEmail");

    if (nameEl !== null && nameEl instanceof HTMLInputElement) {
      nameEl.addEventListener("input", function () {
        localStorage.setItem(KEY_NAME, nameEl.value);
      });
    }

    if (emailEl !== null && emailEl instanceof HTMLInputElement) {
      emailEl.addEventListener("input", function () {
        localStorage.setItem(KEY_EMAIL, emailEl.value);
      });
    }
  }

  /* ── Set Today ── */
  function setToday() {
    var d    = new Date();
    var yyyy = String(d.getFullYear());
    var mm   = String(d.getMonth() + 1).padStart(2, "0");
    var dd   = String(d.getDate()).padStart(2, "0");
    setVal("date", yyyy + "-" + mm + "-" + dd);
  }

  /* ── Clear All ── */
  function clearAll() {
    if (!confirm("Delete all invoice history? This cannot be undone.")) return;
    localStorage.removeItem(KEY_HISTORY);
    renderHistory();
    showToast("History cleared.", "error");
  }

  /* ── Init ── */
  setToday();
  loadUserData();
  watchUserData();
  setVal("invoiceNo", peekNext());
  renderHistory();

  var genBtn   = document.getElementById("generateBtn");
  var dlBtn    = document.getElementById("downloadBtn");
  var clrBtn   = document.getElementById("clearAllBtn");

  if (genBtn  !== null) genBtn.addEventListener("click",  generateInvoice);
  if (dlBtn   !== null) dlBtn.addEventListener("click",   downloadPDF);
  if (clrBtn  !== null) clrBtn.addEventListener("click",  clearAll);

})();
</script>
</body>
</html>
